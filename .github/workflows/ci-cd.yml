name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            vimukthirandunu/smart-ref:${{ github.sha }}
            vimukthirandunu/smart-ref:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.0

        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,SECRET_KEY

          script: |
            printf "%s\n" \
            "version: '3.8'" \
            "services:" \
            "  flask-web-app:" \
            "    image: vimukthirandunu/smart-ref:$IMAGE_TAG" \
            "    ports:" \
            "      - \"5000:5000\"" \
            "    environment:" \
            "      - SECRET_KEY=$SECRET_KEY" \
            "    volumes:" \
            "      - ./data:/app/data" \
            > docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sleep 10
            docker compose -f docker-compose.prod.yml exec flask-web-app python database.py
            if ! curl -f http://localhost:5000; then
                echo "Health check failed. Rolling back..."
                docker compose -f docker-compose.prod.yml down
                sed -i "s|vimukthirandunu/smart-ref:$IMAGE_TAG|vimukthirandunu/smart-ref:latest|g" docker-compose.prod.yml
                docker compose -f docker-compose.prod.yml pull
                docker compose -f docker-compose.prod.yml up -d --remove-orphans
                echo "Rollback complete"
                exit 1
            fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0

        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,SECRET_KEY

          script: |
            printf "%s\n" \
            "version: '3.8'" \
            "services:" \
            "  flask-web-app:" \
            "    image: vimukthirandunu/smart-ref:$IMAGE_TAG" \
            "    ports:" \
            "      - \"5000:5000\"" \
            "    environment:" \
            "      - SECRET_KEY=$SECRET_KEY" \
            "    volumes:" \
            "      - ./data:/app/data" \
            > docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sleep 10
            docker compose -f docker-compose.prod.yml exec flask-web-app python database.py
            if ! curl -f http://localhost:5000; then
                echo "Health check failed. Rolling back..."
                docker compose -f docker-compose.prod.yml down
                sed -i "s|vimukthirandunu/smart-ref:$IMAGE_TAG|vimukthirandunu/smart-ref:latest|g" docker-compose.prod.yml
                docker compose -f docker-compose.prod.yml pull
                docker compose -f docker-compose.prod.yml up -d --remove-orphans
                echo "Rollback complete"
                exit 1
            fi