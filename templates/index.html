<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Warehouse Inventory System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .hero-container {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
        }
        .hero-container h1 {
            color: white;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
            letter-spacing: -1px;
        }
        .hero-container p {
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .hero-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            justify-content: center;
        }
        .hero-buttons a {
            background: white;
            color: #667eea;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.15);
        }
        .hero-buttons a:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.2);
            background: #f0f0f0;
        }
        .hero-buttons a.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }
        .hero-buttons a.secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .feature-item {
            color: white;
            text-align: center;
        }
        .feature-item i {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .feature-item p {
            font-size: 14px;
            margin: 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="hero-container">
    <h1><i class="fas fa-cube" style="margin-right: 10px;"></i>Smart Warehouse Inventory System</h1>
    <p>Real-time stock management, inventory tracking, and automated refill alerts for your warehouse operations</p>
    
    <div class="hero-buttons">
        <a href="/"><i class="fas fa-chart-line"></i> Go to Dashboard</a>
        <a href="/products" class="secondary"><i class="fas fa-box"></i> View Stock</a>
    </div>

    <div class="feature-grid">
        <div class="feature-item">
            <i class="fas fa-sync"></i>
            <p>Real-time Sync</p>
        </div>
        <div class="feature-item">
            <i class="fas fa-bell"></i>
            <p>Smart Alerts</p>
        </div>
        <div class="feature-item">
            <i class="fas fa-chart-bar"></i>
            <p>Analytics</p>
        </div>
        <div class="feature-item">
            <i class="fas fa-history"></i>
            <p>Full Audit Trail</p>
        </div>
    </div>
</div>

</body>
</html>
